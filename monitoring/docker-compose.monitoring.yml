# ── Monitoring Stack (append to main docker-compose.yml or use separately) ──
version: "3.9"

services:
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: genai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.1
    container_name: genai-grafana
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: genai_grafana_2024
      GF_USERS_ALLOW_SIGN_UP: "false"
    restart: unless-stopped
    depends_on:
      - prometheus

  # Optional: PostgreSQL metrics exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: genai-pg-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://genai:genai_secret_2024@postgres:5432/genai_platform?sslmode=disable"
    ports:
      - "9187:9187"
    restart: unless-stopped

  # Optional: Redis metrics exporter
  redis-exporter:
    image: oliver006/redis_exporter:v1.56.0
    container_name: genai-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:


version: "3.9"

services:
  # ─────────────────────────── Data Layer ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: genai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-genai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genai_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-genai_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/shared/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-genai}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: genai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: genai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: genai-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j_secret_2024}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-neo4j_secret_2024} 'RETURN 1' || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: genai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  # ─────────────────────────── Services ────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    image: genai-platform/api-gateway:latest
    container_name: genai-api-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pdf-rag-service:
    build:
      context: .
      dockerfile: services/pdf-rag-service/Dockerfile
    image: genai-platform/pdf-rag-service:latest
    container_name: genai-pdf-rag
    restart: unless-stopped
    ports:
      - "${RAG_SERVICE_PORT:-8001}:8001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_started

  ats-agent-service:
    build:
      context: .
      dockerfile: services/ats-agent-service/Dockerfile
    image: genai-platform/ats-agent-service:latest
    container_name: genai-ats-agent
    restart: unless-stopped
    ports:
      - "${ATS_SERVICE_PORT:-8002}:8002"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  research-service:
    build:
      context: .
      dockerfile: services/research-service/Dockerfile
    image: genai-platform/research-service:latest
    container_name: genai-research
    restart: unless-stopped
    ports:
      - "${RESEARCH_SERVICE_PORT:-8003}:8003"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  sql-service:
    build:
      context: .
      dockerfile: services/sql-service/Dockerfile
    image: genai-platform/sql-service:latest
    container_name: genai-sql
    restart: unless-stopped
    ports:
      - "${SQL_SERVICE_PORT:-8004}:8004"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  neo4j_data:
  ollama_data:
